---
- name: Install Aviate plugin
  become: true
  ansible.builtin.command: |
    "{{ kpm_path }}/kpm" install_java_plugin aviate --from-source-file={{ kb_plugins_dir }}/aviate-plugin.jar --destination={{ kb_plugins_dir }}
  args:
    creates: "{{ kb_plugins_dir }}/plugins/java/aviate-plugin"
  tags:
    - aviate
    - plugins
