---
- name: Find Aviate plugin JAR
  ansible.builtin.find:
    paths: "{{ kb_plugins_dir }}"
    patterns: "aviate-plugin-*.jar"
    file_type: file
  register: aviate_plugin

- name: Install Aviate plugin
  become: true
  ansible.builtin.command: |
    "{{ kpm_path }}/kpm" install_java_plugin aviate --from-source-file={{ aviate_plugin.files[0].path }} --destination={{ kb_plugins_dir }}
  args:
    creates: "{{ kb_plugins_dir }}/plugins/java/aviate-plugin"
  tags:
    - aviate
    - plugins
